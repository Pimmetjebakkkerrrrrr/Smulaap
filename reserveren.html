<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tafel Reserveren | De Smulaap</title>
    <style>
        /* Dezelfde basisstijlen als de andere pagina's */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #fcf9f5;
            color: #333;
            line-height: 1.6;
        }

        /* Navigatiebalk */
        header {
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #d35400;
            text-decoration: none;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: #555;
            font-weight: 600;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #d35400;
        }

        /* Reserveren Sectie */
        .reservation-section {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .reservation-section h1 {
            color: #d35400;
            margin-bottom: 10px;
            text-align: center;
        }

        .reservation-section p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        /* Formulier Styling */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }

        .form-group input, 
        .form-group select, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            background-color: #fafafa;
            transition: border-color 0.3s;
        }

        .form-group input:focus, 
        .form-group select:focus, 
        .form-group textarea:focus {
            border-color: #d35400;
            outline: none;
            background-color: #fff;
        }

        .submit-btn {
            display: block;
            width: 100%;
            background-color: #d35400;
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 25px;
        }

        .submit-btn:hover {
            background-color: #e67e22;
        }

        /* Footer */
        footer {
            background-color: #2c3e50;
            color: white;
            padding: 40px 20px;
            margin-top: 60px;
        }

        .footer-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            max-width: 1100px;
            margin: 0 auto;
        }

        .footer-box {
            margin: 20px;
            min-width: 250px;
        }

        .footer-box h3 {
            margin-bottom: 15px;
            color: #e67e22;
            border-bottom: 2px solid #e67e22;
            padding-bottom: 5px;
            display: inline-block;
        }

        .footer-box p {
            margin-bottom: 8px;
            font-size: 14px;
        }

        .copyright {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #bdc3c7;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
            }
            nav ul {
                margin-top: 15px;
            }
            .reservation-section {
                margin: 20px;
                padding: 20px;
            }
            .footer-container {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- Navigatiebalk -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">🍴 De Smulaap</a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menukaart</a></li>
                    <li><a href="reserveren.html">Reserveren</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Reserveringsformulier -->
    <main class="reservation-section">
        <h1>Kom Gezellig Smullen!</h1>
        <p>Vul het onderstaande formulier in om een tafel te reserveren.</p>

        <!-- Formspree zorgt ervoor dat de inzendingen echt verzonden kunnen worden -->
        <form action="https://formspree.io" method="POST">
            
            <div class="form-group">
                <label for="name">Naam:</label>
                <input type="text" id="name" name="naam" placeholder="Jouw volledige naam" required>
            </div>

            <div class="form-group">
                <label for="email">E-mailadres:</label>
                <input type="email" id="email" name="email" placeholder="voorbeeld@email.com" required>
            </div>

            <div class="form-group">
                <label for="date">Datum:</label>
                <input type="date" id="date" name="datum" required>
            </div>

            <div class="form-group">
                <label for="time">Tijdstip:</label>
                <select id="time" name="tijd" required>
                    <option value="" disabled selected>Kies een tijdstip</option>
                    <option value="16:00">16:00 uur</option>
                    <option value="17:00">17:00 uur</option>
                    <option value="18:00">18:00 uur</option>
                    <option value="19:00">19:00 uur</option>
                    <option value="20:00">20:00 uur</option>
                    <option value="21:00">21:00 uur</option>
                </select>
            </div>

            <div class="form-group">
                <label for="guests">Aantal personen:</label>
                <select id="guests" name="personen" required>
                    <option value="" disabled selected>Kies aantal personen</option>
                    <option value="1">1 persoon</option>
                    <option value="2">2 personen</option>
                    <option value="3">3 personen</option>
                    <option value="4">4 personen</option>
                    <option value="5">5 personen</option>
                    <option value="6+">Meer dan 5 personen</option>
                </select>
            </div>

            <div class="form-group">
                <label for="comments">Bijzonderheden of allergieën (optioneel):</label>
                <textarea id="comments" name="opmerkingen" rows="4" placeholder="Bijv. kinderstoel gewenst of glutenvrij dieet..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Reserveer Mijn Tafel</button>
        </form>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-container">
            <div class="footer-box">
                <h3>Ons Adres</h3>
                <p>Dorpsstraat 42</p>
                <p>1234 AB Smulstad</p>
            </div>
            <div class="footer-box">
                <h3>Openingstijden</h3>
                <p>Dinsdag t/m Zondag geopend vanaf 12:00 of 16:00 uur.</p>
            </div>
        </div>
        <div class="copyright">
            <p>&copy; 2026 Restaurant De Smulaap - Schoolproject</p>
        </div>
    </footer>

</body>
</html>
