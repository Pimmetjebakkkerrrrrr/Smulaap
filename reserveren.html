<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserveren - Smulaap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Jouw navigatiemenu (pas dit aan naar je eigen menu) -->
    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="reserveren.html">Reserveren</a>
        <a href="info.html">Info</a>
    </nav>

    <main style="padding: 20px; max-width: 500px; margin: 0 auto;">
        <h2>Tafeltje reserveren bij Smulaap</h2>
        
        <!-- Het Reserveringsformulier -->
        <form id="reservationForm">
            <div style="margin-bottom: 15px;">
                <label for="name">Naam:</label><br>
                <input type="text" id="name" required style="width: 100%; padding: 8px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="date">Datum:</label><br>
                <input type="date" id="date" required style="width: 100%; padding: 8px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="time">Tijd:</label><br>
                <input type="time" id="time" required style="width: 100%; padding: 8px;">
            </div>

            <button type="submit" style="padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer;">
                Reserveren
            </button>
        </form>

        <!-- Het succesbericht (is standaard onzichtbaar) -->
        <div id="successMessage" style="display: none; margin-top: 20px; padding: 15px; background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 5px;">
            <p id="messageText"></p>
        </div>
    </main>

    <!-- Het JavaScript-gedeelte dat de magie doet -->
    <script>
        document.getElementById('reservationForm').addEventListener('submit', function(event) {
            // Voorkom dat de pagina herlaadt na het klikken op de knop
            event.preventDefault();

            // Haal de ingevulde datum en tijd op uit de invoervelden
            const inputDate = document.getElementById('date').value;
            const inputTime = document.getElementById('time').value;

            // Formatteer de datum naar een nettere Nederlandse weergave (DD-MM-YYYY)
            const parts = inputDate.split('-');
            const formattedDate = parts[2] + '-' + parts[1] + '-' + parts[0];

            // Maak de tekst voor het succesbericht
            const outputMessage = `Gereserveerd! Kom om ${formattedDate} om ${inputTime} uur bij ons langs!`;

            // Zet de tekst in het berichtvenster
            document.getElementById('messageText').innerText = outputMessage;

            // Maak het formulier onzichtbaar en toon het succesbericht
            document.getElementById('reservationForm').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
        });
    </script>

</body>
</html>
